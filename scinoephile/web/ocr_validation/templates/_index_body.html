{% for row in rows %}
   {% include "_subtitle.html" %}
{% endfor %}
<div class="validation-controls">
   <form
      class="filter-toggle"
      hx-post="/filters/done"
      hx-target="body"
      hx-swap="innerHTML"
   >
      {% if include_done_subtitles %}
         <input type="hidden" name="include_done_subtitles" value="0" />
         <button
            type="submit"
            aria-pressed="true"
            title="Hide subtitles with no concerns"
         >Hide Validated</button>
      {% else %}
         <input type="hidden" name="include_done_subtitles" value="1" />
         <button
            type="submit"
            aria-pressed="false"
            title="Show subtitles with no concerns"
         >Show Validated</button>
      {% endif %}
   </form>
   <form
      hx-post="/exit"
      hx-target="body"
      hx-swap="innerHTML"
   >
      <button type="submit">Exit Validation</button>
   </form>
</div>
